<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mutopedia</title>
<style>
  :root{
    --bg:#0b0e14; --card:#141926; --card2:#171d2c;
    --line:#232c40; --text:#e6ecf7; --dim:#8a97b0; --faint:#5b6883;
    --accent:#4da3ff; --accent2:#6ee7ff;
    --bronze:#c98a4b; --silver:#b8c4d6; --gold:#f2c14e; --plat:#8fe3d0;
    --atk:#ff8a6b; --hp:#4da3ff;
    --r:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:
      radial-gradient(900px 500px at 12% -10%, #16203a 0%, transparent 60%),
      radial-gradient(800px 500px at 100% 0%, #10202a 0%, transparent 55%),
      var(--bg);
    color:var(--text);
    font:15px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  header{
    position:sticky; top:0; z-index:20;
    backdrop-filter:blur(14px);
    background:linear-gradient(180deg, rgba(11,14,20,.92), rgba(11,14,20,.72));
    border-bottom:1px solid var(--line);
  }
  .wrap{max-width:1400px;margin:0 auto;padding:0 22px}
  .bar{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:18px 0}
  .brand{display:flex;align-items:baseline;gap:10px;margin-right:auto}
  .brand h1{
    font-size:20px;font-weight:650;letter-spacing:-.02em;
    background:linear-gradient(92deg,var(--text),var(--accent2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .count{font-size:12.5px;color:var(--faint);font-variant-numeric:tabular-nums}

  .search{position:relative;flex:1 1 320px;max-width:460px}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5}
  .search input{
    width:100%;padding:11px 14px 11px 40px;
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    color:var(--text);font:inherit;outline:none;
    transition:border-color .18s, box-shadow .18s, background .18s;
  }
  .search input::placeholder{color:var(--faint)}
  .search input:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 4px rgba(77,163,255,.13);
    background:var(--card2);
  }

  main.wrap{padding:38px 22px 80px}
  .grid{
    display:grid;gap:18px;
    grid-template-columns:repeat(auto-fill,minmax(232px,1fr));
  }

  .card{
    background:linear-gradient(168deg,var(--card2),var(--card));
    border:1px solid var(--line);border-radius:var(--r);
    padding:16px 15px 14px;
    display:flex;flex-direction:column;
    contain:content;
    opacity:0;transform:translateY(14px);
    transition:transform .5s cubic-bezier(.2,.7,.3,1), opacity .5s, border-color .22s, box-shadow .22s;
  }
  .card.in{opacity:1;transform:none}
  .card:hover{
    border-color:#33507d;
    box-shadow:0 14px 34px -14px rgba(0,0,0,.75), 0 0 0 1px rgba(77,163,255,.12) inset;
    transform:translateY(-3px);
  }

  .thumb{height:118px;display:grid;place-items:center;margin-bottom:8px;position:relative}
  .thumb::after{
    content:"";position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
    width:74%;height:14px;border-radius:50%;
    background:radial-gradient(ellipse,rgba(77,163,255,.24),transparent 70%);
  }
  .thumb img{
    max-height:112px;max-width:100%;object-fit:contain;
    filter:drop-shadow(0 8px 14px rgba(0,0,0,.55));
    transition:transform .3s cubic-bezier(.2,.7,.3,1);
  }
  .card:hover .thumb img{transform:translateY(-4px) scale(1.045)}

  .name{font-size:15px;font-weight:620;letter-spacing:-.01em;text-align:center}
  .idline{
    text-align:center;font-size:11px;color:var(--faint);
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;margin-top:2px;
  }

  .rule{height:1px;background:var(--line);margin:12px 0 10px}

  .atks{display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:center}
  .atk .lbl{font-size:10px;letter-spacing:.09em;color:var(--faint);text-transform:uppercase}
  .atk .val{font-size:17px;font-weight:660;color:var(--atk);font-variant-numeric:tabular-nums;margin-top:1px}

  .hp{margin-top:11px}
  .hp .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
  .hp .lbl{font-size:10px;letter-spacing:.09em;color:var(--faint);text-transform:uppercase}
  .hp .val{font-size:13.5px;font-weight:640;color:var(--hp);font-variant-numeric:tabular-nums}
  .track{height:6px;border-radius:99px;background:#1c2334;overflow:hidden}
  .fill{
    height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,var(--hp),var(--accent2));
    box-shadow:0 0 12px rgba(77,163,255,.5);
    transition:width .9s cubic-bezier(.2,.7,.3,1);
  }

  .orig{
    margin-top:12px;padding:9px 11px;border-radius:11px;
    background:rgba(242,193,78,.07);border:1px solid rgba(242,193,78,.2);
    display:flex;justify-content:space-between;align-items:center;gap:8px;
  }
  .orig .k{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
  .orig .v{font-size:15px;font-weight:660;color:var(--gold);font-variant-numeric:tabular-nums}

  .tiers{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px}
  .tier{
    padding:7px 9px;border-radius:10px;
    background:#101724;border:1px solid var(--line);
    transition:border-color .2s, background .2s;
  }
  .card:hover .tier{background:#121a29}
  .tier .k{font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);display:flex;align-items:center;gap:5px}
  .tier .k i{width:7px;height:7px;border-radius:50%;display:inline-block}
  .tier .v{font-size:14px;font-weight:640;font-variant-numeric:tabular-nums;margin-top:2px}
  .t-bronze i{background:var(--bronze)} .t-bronze .v{color:var(--bronze)}
  .t-silver i{background:var(--silver)} .t-silver .v{color:var(--silver)}
  .t-gold   i{background:var(--gold)}   .t-gold   .v{color:var(--gold)}
  .t-plat   i{background:var(--plat)}   .t-plat   .v{color:var(--plat)}

  .copy{
    margin-top:12px;width:100%;padding:9px;border-radius:11px;cursor:pointer;
    background:#111a2b;border:1px solid var(--line);color:var(--dim);
    font:inherit;font-size:12.5px;font-weight:560;
    display:flex;align-items:center;justify-content:center;gap:7px;
    transition:background .18s,color .18s,border-color .18s,transform .12s;
  }
  .copy:hover{background:#16233a;color:var(--text);border-color:#33507d}
  .copy:active{transform:scale(.975)}
  .copy.ok{background:rgba(77,163,255,.16);color:var(--accent2);border-color:var(--accent)}

  .empty{text-align:center;padding:90px 20px;color:var(--faint)}
  .empty b{display:block;color:var(--text);font-size:17px;margin-bottom:7px;font-weight:600}

  .err{
    max-width:660px;margin:70px auto;padding:22px 24px;
    background:var(--card);border:1px solid #4a2230;border-radius:var(--r);
  }
  .err h2{font-size:16px;margin-bottom:9px}
  .err p{color:var(--dim);font-size:13.5px;margin-bottom:12px}
  .err code{
    display:block;background:#0a0e16;border:1px solid var(--line);border-radius:9px;
    padding:11px 13px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;color:var(--accent2);
  }

  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
    .card{opacity:1;transform:none}
  }
</style>
</head>
<body>

<header>
  <div class="wrap bar">
    <div class="brand">
      <h1>Mutopedia</h1>
      <span class="count" id="count">loading…</span>
    </div>

    <label class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
      </svg>
      <input id="q" type="search" placeholder="Search by name, ID or price…" autocomplete="off" spellcheck="false">
    </label>
  </div>
</header>

<main class="wrap">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" hidden><b>No mutants found</b>Try a different search term.</div>
</main>

<script>
const grid=document.getElementById('grid'), empty=document.getElementById('empty'),
      countEl=document.getElementById('count'), q=document.getElementById('q');
let DATA=[], maxHP=1;

const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const num=v=>{const n=Number(v); return Number.isFinite(n)?n.toLocaleString():'—';};

const io=new IntersectionObserver(es=>{
  for(const e of es){
    if(!e.isIntersecting) continue;
    e.target.classList.add('in');
    const f=e.target.querySelector('.fill');
    if(f) requestAnimationFrame(()=>{ f.style.width=f.dataset.w+'%'; });
    io.unobserve(e.target);
  }
},{rootMargin:'120px'});

function tier(cls,label,val){
  return `<div class="tier ${cls}"><div class="k"><i></i>${label}</div><div class="v">${num(val)}</div></div>`;
}

function card(m,i){
  const t=m.Tags||{};
  const hp=Number(m.Health)||0;
  const pct=Math.max(2,Math.min(100,Math.round(hp/maxHP*100)));
  const el=document.createElement('article');
  el.className='card';
  el.style.transitionDelay=Math.min(i,12)*26+'ms';
  el.innerHTML=`
    <div class="thumb">
      ${m.Icon?`<img src="${esc(m.Icon)}" alt="${esc(m.Name||m.ID)}" loading="lazy" decoding="async">`:''}
    </div>
    <div class="name">${esc(m.Name||m.ID)}</div>
    <div class="idline">${esc(m.ID)}</div>
    <div class="rule"></div>

    <div class="atks">
      <div class="atk"><div class="lbl">ATK 1</div><div class="val">${num(m.Atk1Dmg)}</div></div>
      <div class="atk"><div class="lbl">ATK 2</div><div class="val">${num(m.Atk2Dmg)}</div></div>
    </div>

    <div class="hp">
      <div class="top"><span class="lbl">Health</span><span class="val">${num(m.Health)}</span></div>
      <div class="track"><div class="fill" data-w="${pct}"></div></div>
    </div>

    <div class="orig">
      <span class="k">${esc(m.Type==='credits'?'Credits':'Gold')} · Original</span>
      <span class="v">${num(m.Price)}</span>
    </div>

    <div class="tiers">
      ${tier('t-bronze','Bronze',t.changePrice00)}
      ${tier('t-silver','Silver',t.changePrice01)}
      ${tier('t-gold','Gold',t.changePrice02)}
      ${tier('t-plat','Platinum',t.changePrice03)}
    </div>

    <button class="copy" data-id="${esc(m.ID)}">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/>
      </svg>Copy code</button>`;
  io.observe(el);
  return el;
}

function render(list){
  grid.replaceChildren();
  empty.hidden=list.length>0;
  const frag=document.createDocumentFragment();
  list.forEach((m,i)=>frag.appendChild(card(m,i)));
  grid.appendChild(frag);
  countEl.textContent=`${list.length} of ${DATA.length} mutants`;
}

function apply(){
  const s=q.value.trim().toLowerCase();
  if(!s) return render(DATA);
  render(DATA.filter(m=>m._hay.includes(s)));
}

let t; q.addEventListener('input',()=>{clearTimeout(t);t=setTimeout(apply,110);});

grid.addEventListener('click',async e=>{
  const b=e.target.closest('.copy'); if(!b) return;
  const id=b.dataset.id;
  try{ await navigator.clipboard.writeText(id); }
  catch{ const ta=document.createElement('textarea'); ta.value=id; document.body.appendChild(ta);
         ta.select(); document.execCommand('copy'); ta.remove(); }
  const html=b.innerHTML;
  b.classList.add('ok'); b.textContent='Copied '+id;
  setTimeout(()=>{ b.classList.remove('ok'); b.innerHTML=html; },1300);
});

(async()=>{
  let d=null;
  for(const f of ['mutants_full.json','mutants.json']){
    try{ const r=await fetch(f); if(r.ok){ d=await r.json(); break; } }catch{}
  }
  if(!d){
    document.querySelector('main').innerHTML=
      `<div class="err"><h2>Couldn't load mutants_full.json</h2>
       <p>Browsers block reading local files straight from <code>file://</code>.
          Serve this folder over HTTP — run this in the website folder, then open
          <b>http://localhost:8000</b>:</p>
       <code>python -m http.server 8000</code></div>`;
    return;
  }
  const has=(m,k)=>String(m[k]||'').trim()!=='';
  DATA=d.filter(m=>has(m,'Name') && (has(m,'Atk1Name')||has(m,'Atk2Name')) && has(m,'Description'));

  for(const m of DATA){
    const t=m.Tags||{};
    m._hay=[m.Name,m.ID,m.Price,t.changePrice00,t.changePrice01,t.changePrice02,t.changePrice03]
      .filter(v=>v!=null&&v!=='').join(' ').toLowerCase();
    const p=/^([A-Za-z]+)_?(\d+)$/.exec(m.ID||'');
    m._pre=p?p[1].toUpperCase():String(m.ID||'');
    m._num=p?parseInt(p[2],10):0;
  }

  maxHP=Math.max(1,...DATA.map(m=>Number(m.Health)||0));
  DATA.sort((a,b)=>a._pre.localeCompare(b._pre)||a._num-b._num||String(a.ID).localeCompare(String(b.ID)));
  apply();
})();
</script>
</body>
</html>
